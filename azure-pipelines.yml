name: Student CI-CD Demo

# This triggers the pipeline automatically whenever you change the code
on:
  push:
    branches: [ main ]
  workflow_dispatch: # This adds a manual "Run" button in the GitHub UI

jobs:
  # PHASE 1: Continuous Integration (The "Check")
  Build-and-Test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Simulate Build
        run: |
          echo "🔨 Starting Build Process..."
          echo "Compiling code and preparing assets..."
          sleep 2
          echo "Build successful!"

      - name: Simulate Unit Tests
        run: |
          echo "🧪 Running Automated Tests..."
          echo "Test 1: Login functionality... PASSED"
          echo "Test 2: Database connection... PASSED"
          echo "All tests passed (100% success rate)."

  # PHASE 2: Continuous Deployment (The "Release")
  Deploy:
    runs-on: ubuntu-latest
    needs: Build-and-Test # This ensures it won't deploy if the tests fail
    steps:
      - name: Simulate Deployment
        run: |
          echo "🚀 Deploying to Production Server..."
          echo "Transferring files to https://demo-app.com"
          sleep 3
          echo "✅ Deployment Complete! The app is now live."
