# This is the correct syntax for Azure DevOps Pipelines
trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: BuildStage
  displayName: 'Phase 1: Continuous Integration'
  jobs:
  - job: BuildJob
    steps:
    - script: |
        echo "🔨 Starting Build Process..."
        echo "Compiling code and preparing assets..."
      displayName: 'Build and Compile'

    - script: |
        echo "🧪 Running Automated Tests..."
        echo "Test 1: Login functionality... PASSED"
        echo "All tests passed (100% success rate)."
      displayName: 'Run Unit Tests'

- stage: DeployStage
  displayName: 'Phase 2: Continuous Deployment'
  dependsOn: BuildStage
  condition: succeeded()
  jobs:
  - job: DeployJob
    steps:
    - script: |
        echo "🚀 Deploying to Production Server..."
        echo "Transferring files to https://demo-app.com"
        echo "✅ Deployment Complete! The app is now live."
      displayName: 'Simulate Deployment'
